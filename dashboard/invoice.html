<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice — LinkCrew</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #17191c; }

    .actions {
      display: flex; gap: 12px; justify-content: flex-end;
      padding: 20px 40px; background: #fff; border-bottom: 1px solid #e8e8e8;
    }
    .btn { border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; padding: 10px 22px; }
    .btn-print { background: #0265dc; color: #fff; }
    .btn-print:hover { background: #1b5abe; }
    .btn-pay { background: #166534; color: #fff; }
    .btn-pay:hover { background: #15803d; }
    .btn-back { background: #f5f5f5; color: #17191c; border: 1px solid #e8e8e8; }
    .btn-back:hover { background: #ebebeb; }

    .page { max-width: 760px; margin: 40px auto; background: #fff;
      border: 1px solid #e8e8e8; border-radius: 12px; padding: 60px; }

    /* Header */
    .inv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 48px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-name { font-size: 22px; font-weight: 800; color: #17191c; }
    .brand-name span { color: #0265dc; }
    .inv-meta { text-align: right; }
    .inv-title { font-size: 32px; font-weight: 800; color: #17191c; letter-spacing: -0.5px; margin-bottom: 8px; }
    .inv-number { font-size: 13px; color: #737475; margin-bottom: 4px; }
    .inv-date { font-size: 13px; color: #737475; }

    /* Status badge */
    .status-badge {
      display: inline-block; font-size: 12px; font-weight: 700;
      padding: 4px 12px; border-radius: 20px; margin-top: 10px;
    }
    .status-paid { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status-unpaid { background: #fefce8; color: #92400e; border: 1px solid #fde68a; }

    /* From / To */
    .parties { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 48px; }
    .party-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #737475; margin-bottom: 10px; }
    .party-name { font-size: 16px; font-weight: 700; color: #17191c; margin-bottom: 4px; }
    .party-detail { font-size: 13px; color: #737475; line-height: 1.7; }

    /* Line items */
    .items-header {
      display: grid; grid-template-columns: 1fr auto;
      padding: 10px 0; border-bottom: 2px solid #17191c;
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #737475;
    }
    .item-row {
      display: grid; grid-template-columns: 1fr auto;
      padding: 20px 0; border-bottom: 1px solid #e8e8e8;
    }
    .item-name { font-size: 15px; font-weight: 600; color: #17191c; margin-bottom: 4px; }
    .item-address { font-size: 13px; color: #737475; }
    .item-amount { font-size: 15px; font-weight: 600; color: #17191c; }

    /* Total */
    .total-row {
      display: flex; justify-content: flex-end; align-items: center;
      gap: 40px; padding: 20px 0; border-top: 2px solid #17191c; margin-top: 0;
    }
    .total-label { font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #737475; }
    .total-amount { font-size: 24px; font-weight: 800; color: #17191c; }

    /* Footer */
    .inv-footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid #e8e8e8;
      font-size: 12px; color: #737475; text-align: center; line-height: 1.6; }

    /* Loading / error */
    .state { text-align: center; padding: 80px 40px; color: #737475; font-size: 15px; }

    @media print {
      body { background: #fff; }
      .actions { display: none; }
      .page { margin: 0; border: none; border-radius: 0; padding: 40px; box-shadow: none; }
    }

    @media (max-width: 600px) {
      .page { padding: 28px 20px; margin: 16px; }
      .inv-header { flex-direction: column; gap: 20px; }
      .inv-meta { text-align: left; }
      .parties { grid-template-columns: 1fr; gap: 24px; }
    }
  </style>
</head>
<body>

  <div class="actions" id="actions">
    <button class="btn btn-back" onclick="history.back()">← Back</button>
    <button class="btn btn-pay" id="pay-btn" onclick="payInvoice()" style="display:none">Pay Now</button>
    <button class="btn btn-pay" id="mark-paid-btn" onclick="markAsPaid()" style="display:none;background:#17191c">Mark as paid</button>
    <button class="btn btn-print" onclick="window.print()">Print / Save PDF</button>
  </div>

  <div class="page" id="invoice-page">
    <div class="state" id="loading">Loading invoice…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const jobId = params.get('job_id');
    const isPortal = params.get('portal') === '1';

    if (!jobId) {
      document.getElementById('loading').textContent = 'No job specified.';
    } else {
      loadInvoice();
    }

    async function getDashboardToken() {
      // Try to get a fresh token via Supabase client (handles auto-refresh)
      try {
        const { supabaseUrl, supabaseKey } = await (await fetch('/api/config')).json();
        const sb = supabase.createClient(supabaseUrl, supabaseKey);
        const { data } = await sb.auth.getSession();
        if (data?.session?.access_token) return data.session.access_token;
      } catch (_) {}
      // Fallback to stored token
      return localStorage.getItem('fs_token');
    }

    async function loadInvoice() {
      let res;
      try {
        if (isPortal) {
          const token = localStorage.getItem('portal_token');
          res = await fetch(`/portal/api/invoice/${jobId}`, {
            headers: { Authorization: `Bearer ${token}` }
          });
        } else {
          const token = await getDashboardToken();
          res = await fetch(`/api/invoice/${jobId}`, {
            headers: { Authorization: `Bearer ${token}` }
          });
        }
      } catch (err) {
        document.getElementById('loading').textContent = 'Failed to load: ' + err.message;
        return;
      }

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        document.getElementById('loading').textContent =
          `Error ${res.status}: ${body.error || 'Invoice not found'}`;
        return;
      }

      const { job, tenant } = await res.json();
      renderInvoice(job, tenant);
    }

    async function payInvoice() {
      if (!isPortal) return;
      try {
        const token = localStorage.getItem('portal_token');
        const res = await fetch('/portal/api/checkout', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ job_id: jobId }),
        });
        const json = await res.json();
        if (!res.ok || json.error) return alert(json.error || 'Unable to start payment');
        if (!json.url) return alert('No checkout URL returned. Check Stripe keys.');
        window.location.href = json.url;
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function fmt(amount) {
      return '$' + parseFloat(amount || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function invNumber(id, date) {
      const d = new Date(date);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `INV-${y}${m}${day}-${id.slice(0, 6).toUpperCase()}`;
    }

    function renderInvoice(job, tenant) {
      const isPaid = job.payment_status === 'paid';
      const client = job.clients || {};
      const invDate = job.updated_at || job.created_at;
      const stripeConnected = tenant?.stripe_connect_status === 'active';
      const canPayCard = isPortal && !isPaid && stripeConnected && parseFloat(job.invoice_amount || 0) > 0;
      const payBtn = document.getElementById('pay-btn');
      if (payBtn) {
        payBtn.style.display = canPayCard ? 'inline-block' : 'none';
        payBtn.textContent = 'Pay with card';
      }
      const markPaidBtn = document.getElementById('mark-paid-btn');
      if (markPaidBtn) markPaidBtn.style.display = !isPortal && !isPaid ? 'inline-block' : 'none';
      window.__invoiceJob = job;

      document.title = `Invoice ${invNumber(job.id, invDate)} — LinkCrew`;

      document.getElementById('invoice-page').innerHTML = `
        <!-- Header -->
        <div class="inv-header">
          <div class="brand">
            ${tenant?.logo_url
              ? `<img src="${tenant.logo_url}" alt="${tenant.company_name || ''}" style="max-height:60px;max-width:180px;object-fit:contain">`
              : `<img src="/logo.svg" alt="LinkCrew" style="width:40px;height:40px">`}
            <div class="brand-name">${tenant?.company_name || 'Link<span>Crew</span>'}</div>
          </div>
          <div class="inv-meta">
            <div class="inv-title">Invoice</div>
            <div class="inv-number">${invNumber(job.id, invDate)}</div>
            <div class="inv-date">Date: ${fmtDate(invDate)}</div>
            <div>
              <span class="status-badge ${isPaid ? 'status-paid' : 'status-unpaid'}">
                ${isPaid ? '✅ Paid' : '⏳ Payment Due'}
              </span>
            </div>
          </div>
        </div>

        <!-- From / To -->
        <div class="parties">
          <div>
            <div class="party-label">From</div>
            <div class="party-name">${tenant?.company_name || 'LinkCrew'}</div>
            <div class="party-detail">
              ${[tenant?.address, tenant?.phone, tenant?.owner_email].filter(Boolean).join('<br>')}
            </div>
          </div>
          <div>
            <div class="party-label">Bill To</div>
            <div class="party-name">${client.name || '—'}</div>
            <div class="party-detail">
              ${[client.address, client.email, client.phone].filter(Boolean).join('<br>')}
            </div>
          </div>
        </div>

        <!-- Line items -->
        <div class="items-header">
          <span>Description</span>
          <span>Amount</span>
        </div>
        <div class="item-row">
          <div>
            <div class="item-name">${job.name}</div>
            ${job.address ? `<div class="item-address">📍 ${job.address}</div>` : ''}
          </div>
          <div class="item-amount">${fmt(job.invoice_amount)}</div>
        </div>

        <!-- Total -->
        <div class="total-row">
          <span class="total-label">Total</span>
          <span class="total-amount">${fmt(job.invoice_amount)}</span>
        </div>

        ${!isPaid ? renderPaymentOptions(tenant, canPayCard) : ''}

        <!-- Footer -->
        <div class="inv-footer">
          ${isPaid
            ? 'Payment received — thank you for your business.'
            : 'Please arrange payment at your earliest convenience. Thank you for your business.'}
        </div>
      `;
    }

    function renderPaymentOptions(tenant, canPayCard) {
      const methods = Array.isArray(tenant?.payment_methods)
        ? tenant.payment_methods.filter(m => m && m.enabled !== false)
        : [];
      if (!canPayCard && !methods.length) return '';
      const esc = s => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      const iconFor = t => ({
        zelle: '💸', venmo: '💠', paypal: '🅿️', cashapp: '💵',
        ach: '🏦', check: '✉️', other: '💳',
      }[t] || '💳');
      const cardBlock = canPayCard
        ? `<div style="padding:20px;border:1px solid #e8e8e8;border-radius:10px;background:#fafafa;margin-bottom:12px">
             <div style="font-size:13px;font-weight:700;color:#17191c;margin-bottom:10px">Pay by card</div>
             <button class="btn btn-pay" onclick="payInvoice()" style="background:#635bff">Pay with card securely</button>
             <div style="font-size:11px;color:#737475;margin-top:8px">Powered by Stripe. Funds go directly to ${esc(window.__invoiceJob?.company_name || 'the contractor')}.</div>
           </div>` : '';
      const methodsBlock = methods.length
        ? `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px">
             ${methods.map(m => `
               <div style="padding:14px;border:1px solid #e8e8e8;border-radius:10px;background:#fff">
                 <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                   <span style="font-size:18px">${iconFor(m.type)}</span>
                   <span style="font-size:13px;font-weight:700;color:#17191c">${esc(m.label || m.type)}</span>
                 </div>
                 ${m.qr_url ? `<img src="${esc(m.qr_url)}" alt="${esc(m.label)} QR" style="width:100%;max-width:160px;aspect-ratio:1;object-fit:contain;border:1px solid #e8e8e8;border-radius:6px;background:#fff;display:block;margin-bottom:8px">` : ''}
                 ${m.detail ? `<div style="font-size:12px;color:#17191c;word-break:break-word"><span style="color:#737475">Send to:</span> ${esc(m.detail)}</div>` : ''}
               </div>`).join('')}
           </div>` : '';
      return `
        <div style="margin-top:40px;padding-top:24px;border-top:1px solid #e8e8e8">
          <div style="font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#737475;margin-bottom:14px">Payment Options</div>
          ${cardBlock}
          ${methodsBlock}
        </div>`;
    }

    async function markAsPaid() {
      if (!confirm('Mark this invoice as paid? The client will be notified.')) return;
      const token = await getDashboardToken();
      const res = await fetch(`/api/jobs/${jobId}/mark-paid`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ notify: 'email' }),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        return alert('Error: ' + (j.error || 'unable to mark paid'));
      }
      loadInvoice();
    }
  </script>
</body>
</html>
