<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FieldSync Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    /* Header */
    .header { background: #1e293b; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; }
    .header h1 { font-size: 20px; font-weight: 700; color: #f8fafc; }
    .header h1 span { color: #38bdf8; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #4ade80; }
    .live-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Stats bar */
    .stats { display: flex; gap: 16px; padding: 16px 24px; background: #1e293b; border-bottom: 1px solid #334155; overflow-x: auto; }
    .stat { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px 20px; min-width: 140px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
    .stat:hover { border-color: #38bdf8; transform: translateY(-1px); }
    .stat.active { border-color: #38bdf8; background: #1e3a5f; }
    .stat .num { font-size: 28px; font-weight: 700; color: #f8fafc; }
    .stat .label { font-size: 11px; color: #94a3b8; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Stat overlay panel */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; align-items: flex-start; justify-content: center; padding-top: 80px; }
    .overlay.visible { display: flex; }
    .overlay-box { background: #1e293b; border: 1px solid #334155; border-radius: 12px; width: 520px; max-height: 70vh; overflow-y: auto; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #334155; position: sticky; top: 0; background: #1e293b; }
    .overlay-header h3 { font-size: 15px; font-weight: 600; color: #f8fafc; }
    .overlay-close { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; line-height: 1; }
    .overlay-close:hover { color: #f8fafc; }
    .overlay-body { padding: 16px 20px; }
    .overlay-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #1e293b; }
    .overlay-row:last-child { border-bottom: none; }
    .overlay-avatar { width: 36px; height: 36px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #94a3b8; flex-shrink: 0; }
    .overlay-info .oi-name { font-size: 13px; font-weight: 500; color: #f8fafc; }
    .overlay-info .oi-sub { font-size: 12px; color: #64748b; margin-top: 2px; }

    /* Main layout */
    .main { display: grid; grid-template-columns: 1fr 380px; gap: 0; height: calc(100vh - 120px); }
    .jobs-panel { padding: 20px; overflow-y: auto; }
    .side-panel { background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }

    /* Job cards */
    .panel-title { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
    .job-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s; }
    .job-card:hover { border-color: #38bdf8; }
    .job-card.selected { border-color: #38bdf8; background: #1e3a5f; }
    .job-card .job-name { font-size: 15px; font-weight: 600; color: #f8fafc; margin-bottom: 4px; }
    .job-card .job-address { font-size: 12px; color: #94a3b8; margin-bottom: 10px; }
    .job-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .chip-blue { background: #1e3a5f; color: #38bdf8; }
    .chip-green { background: #14432a; color: #4ade80; }
    .chip-red { background: #431414; color: #f87171; }
    .chip-yellow { background: #43350e; color: #fbbf24; }

    /* Side panel — supply requests */
    .supply-item { background: #0f172a; border: 1px solid #334155; border-left: 3px solid #f87171; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
    .supply-item .si-job { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .supply-item .si-items { font-size: 13px; color: #f8fafc; margin-bottom: 6px; }
    .supply-item .si-meta { display: flex; align-items: center; justify-content: space-between; }
    .supply-item .si-by { font-size: 11px; color: #64748b; }
    .status-btn { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; }
    .btn-prepare { background: #1e3a5f; color: #38bdf8; }
    .btn-delivered { background: #14432a; color: #4ade80; }

    /* Job detail */
    .detail-panel { display: none; }
    .detail-panel.visible { display: block; }
    .update-item { display: flex; gap: 10px; margin-bottom: 10px; }
    .update-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .ui-checkin { background: #14432a; }
    .ui-checkout { background: #1e3a5f; }
    .ui-bottleneck { background: #43350e; }
    .ui-supply_request { background: #431414; }
    .ui-photo { background: #2d1b69; }
    .ui-update { background: #1e293b; }
    .update-body .ub-name { font-size: 11px; color: #94a3b8; }
    .update-body .ub-msg { font-size: 13px; color: #e2e8f0; margin-top: 2px; }
    .update-body .ub-time { font-size: 10px; color: #475569; margin-top: 2px; }

    /* Employees */
    .emp-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1e293b; }
    .emp-avatar { width: 32px; height: 32px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #94a3b8; }
    .emp-name { font-size: 13px; color: #e2e8f0; }
    .emp-status { font-size: 11px; margin-top: 2px; }

    /* Add job form */
    .add-job-btn { background: #38bdf8; color: #0f172a; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; float: right; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.visible { display: flex; }
    .modal { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; width: 400px; }
    .modal h3 { margin-bottom: 16px; color: #f8fafc; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    .form-group input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #38bdf8; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel { background: #334155; color: #e2e8f0; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    .btn-save { background: #38bdf8; color: #0f172a; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; }

    /* Empty state */
    .empty { text-align: center; padding: 40px; color: #475569; }
    .empty .e-icon { font-size: 40px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="header">
  <h1>Field<span>Sync</span> Dashboard</h1>
  <div class="live-badge"><div class="live-dot"></div> LIVE</div>
</div>

<div class="stats">
  <div class="stat" id="scard-jobs" onclick="showOverlay('jobs')"><div class="num" id="stat-jobs">—</div><div class="label">Active Jobs</div></div>
  <div class="stat" id="scard-crew" onclick="showOverlay('crew')"><div class="num" id="stat-crew">—</div><div class="label">Crew On Site</div></div>
  <div class="stat" id="scard-supplies" onclick="showOverlay('supplies')"><div class="num" id="stat-supplies" style="color:#f87171">—</div><div class="label">Supply Requests</div></div>
  <div class="stat" id="scard-bottlenecks" onclick="showOverlay('bottlenecks')"><div class="num" id="stat-bottlenecks" style="color:#fbbf24">—</div><div class="label">Bottlenecks</div></div>
</div>

<!-- Stat overlay -->
<div class="overlay" id="stat-overlay" onclick="closeOverlay(event)">
  <div class="overlay-box">
    <div class="overlay-header">
      <h3 id="overlay-title">—</h3>
      <button class="overlay-close" onclick="closeOverlay()">✕</button>
    </div>
    <div class="overlay-body" id="overlay-body"></div>
  </div>
</div>

<div class="main">

  <!-- Left: Jobs List -->
  <div class="jobs-panel">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
      <div class="panel-title">Active Jobs</div>
      <button class="add-job-btn" onclick="openAddJob()">+ Add Job</button>
    </div>
    <div id="jobs-list">
      <div class="empty"><div class="e-icon">📋</div>Loading jobs...</div>
    </div>
  </div>

  <!-- Right: Supply requests + job detail -->
  <div class="side-panel">
    <!-- Supply requests view (default) -->
    <div id="supplies-view">
      <div class="panel-title">Pending Supply Requests</div>
      <div id="supplies-list">
        <div class="empty"><div class="e-icon">📦</div>No pending requests</div>
      </div>
    </div>

    <!-- Job detail view -->
    <div id="detail-view" class="detail-panel">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
        <button onclick="closeDetail()" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:18px;">←</button>
        <div class="panel-title" style="margin:0" id="detail-title">Job Detail</div>
      </div>
      <div id="detail-employees" style="margin-bottom:20px;"></div>
      <div class="panel-title">Today's Activity</div>
      <div id="detail-updates"></div>
    </div>
  </div>
</div>

<!-- Add Job Modal -->
<div class="modal-overlay" id="add-job-modal">
  <div class="modal">
    <h3>Add New Job</h3>
    <div class="form-group">
      <label>Job Name</label>
      <input type="text" id="new-job-name" placeholder="e.g. Downtown Office Renovation">
    </div>
    <div class="form-group">
      <label>Address</label>
      <input type="text" id="new-job-address" placeholder="e.g. 123 Main St, Miami FL">
    </div>
    <div class="form-group">
      <label>Manager Email</label>
      <input type="email" id="new-job-email" placeholder="manager@company.com">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddJob()">Cancel</button>
      <button class="btn-save" onclick="saveJob()">Create Job</button>
    </div>
  </div>
</div>

<script>
let supabaseClient;
let selectedJobId = null;

const updateIcons = {
  checkin: { icon: '✅', cls: 'ui-checkin' },
  checkout: { icon: '👋', cls: 'ui-checkout' },
  bottleneck: { icon: '⚠️', cls: 'ui-bottleneck' },
  supply_request: { icon: '📦', cls: 'ui-supply_request' },
  photo: { icon: '📸', cls: 'ui-photo' },
  update: { icon: '💬', cls: 'ui-update' }
};

async function init() {
  const res = await fetch('/api/config');
  const { supabaseUrl, supabaseKey } = await res.json();
  supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  await loadDashboard();
  await loadSupplies();
  subscribeRealtime();
}

async function loadDashboard() {
  const res = await fetch('/api/jobs');
  const jobs = await res.json();
  allJobsData = jobs;

  document.getElementById('stat-jobs').textContent = jobs.filter(j => j.status === 'active').length;

  const list = document.getElementById('jobs-list');
  if (!jobs.length) {
    list.innerHTML = '<div class="empty"><div class="e-icon">📋</div>No active jobs. Add one above.</div>';
    return;
  }

  // Load full details for stats
  let totalCrew = 0, totalSupplies = 0, totalBottlenecks = 0;
  const today = new Date(); today.setHours(0,0,0,0);

  list.innerHTML = jobs.map(job => `
    <div class="job-card ${selectedJobId === job.id ? 'selected' : ''}" onclick="openDetail('${job.id}', '${job.name.replace(/'/g,"\\'")}')">
      <div class="job-name">${job.name}</div>
      <div class="job-address">📍 ${job.address || 'No address'}</div>
      <div class="job-meta">
        <span class="chip chip-green">● ${job.status}</span>
        <span class="chip chip-blue" id="crew-${job.id}">👷 Loading...</span>
        <span class="chip chip-red" id="supply-${job.id}">📦 ...</span>
      </div>
    </div>
  `).join('');

  // Fetch per-job details async
  allAssignmentsData = [];
  allSuppliesData = [];
  allUpdatesData = [];

  jobs.forEach(async job => {
    const r = await fetch(`/api/jobs/${job.id}`);
    const d = await r.json();
    const activeAssignments = (d.assignments || []).filter(a => a.checked_in_at && !a.checked_out_at);
    const pendingSupplies = (d.supplies || []).filter(s => s.status === 'pending');
    const todayBottlenecks = (d.updates || []).filter(u => u.type === 'bottleneck' && new Date(u.created_at) >= today);

    // Store globally with job name for overlays
    activeAssignments.forEach(a => { a.jobs = { name: job.name }; allAssignmentsData.push(a); });
    pendingSupplies.forEach(s => { s.jobs = { name: job.name }; allSuppliesData.push(s); });
    todayBottlenecks.forEach(b => { b.jobs = { name: job.name }; b.job_id = job.id; allUpdatesData.push(b); });

    const crewEl = document.getElementById(`crew-${job.id}`);
    const supplyEl = document.getElementById(`supply-${job.id}`);
    if (crewEl) crewEl.textContent = `👷 ${activeAssignments.length} on site`;
    if (supplyEl) supplyEl.textContent = `📦 ${pendingSupplies.length} pending`;

    totalCrew += activeAssignments.length;
    totalSupplies += pendingSupplies.length;
    totalBottlenecks += todayBottlenecks.length;

    document.getElementById('stat-crew').textContent = totalCrew;
    document.getElementById('stat-supplies').textContent = totalSupplies;
    document.getElementById('stat-bottlenecks').textContent = totalBottlenecks;
  });
}

async function loadSupplies() {
  const res = await fetch('/api/supplies/pending');
  const supplies = await res.json();
  const el = document.getElementById('supplies-list');

  if (!supplies.length) {
    el.innerHTML = '<div class="empty"><div class="e-icon">✅</div>All supplies accounted for</div>';
    return;
  }

  el.innerHTML = supplies.map(s => `
    <div class="supply-item" id="supply-item-${s.id}">
      <div class="si-job">${s.jobs?.name} • <span style="color:${s.urgency==='same_day'?'#f87171':'#fbbf24'}">${s.urgency.replace('_',' ').toUpperCase()}</span></div>
      <div class="si-items">${s.items}</div>
      <div class="si-meta">
        <span class="si-by">👷 ${s.employees?.name}</span>
        <div style="display:flex;gap:6px">
          <button class="status-btn btn-prepare" onclick="updateSupply('${s.id}','preparing')">Preparing</button>
          <button class="status-btn btn-delivered" onclick="updateSupply('${s.id}','delivered')">Delivered ✓</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function updateSupply(id, status) {
  await fetch(`/api/supplies/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  if (status === 'delivered') {
    document.getElementById(`supply-item-${id}`)?.remove();
  }
  await loadSupplies();
}

async function openDetail(jobId, jobName) {
  selectedJobId = jobId;
  document.getElementById('supplies-view').style.display = 'none';
  document.getElementById('detail-view').classList.add('visible');
  document.getElementById('detail-title').textContent = jobName;

  const res = await fetch(`/api/jobs/${jobId}`);
  const { assignments, updates } = await res.json();

  const today = new Date(); today.setHours(0,0,0,0);
  const todayUpdates = (updates || []).filter(u => new Date(u.created_at) >= today);

  // Employees
  const empEl = document.getElementById('detail-employees');
  if (assignments?.length) {
    empEl.innerHTML = `
      <div class="panel-title">Crew</div>
      ${assignments.map(a => `
        <div class="emp-item">
          <div class="emp-avatar">${(a.employees?.name||'?')[0].toUpperCase()}</div>
          <div>
            <div class="emp-name">${a.employees?.name || 'Unknown'}</div>
            <div class="emp-status" style="color:${a.checked_out_at ? '#94a3b8' : '#4ade80'}">
              ${a.checked_out_at ? '● Off site' : '● On site'}
            </div>
          </div>
        </div>
      `).join('')}
    `;
  } else {
    empEl.innerHTML = '<div class="empty" style="padding:16px 0">No crew checked in today</div>';
  }

  // Updates
  const updEl = document.getElementById('detail-updates');
  if (todayUpdates.length) {
    updEl.innerHTML = todayUpdates.map(u => {
      const ui = updateIcons[u.type] || updateIcons.update;
      const time = new Date(u.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      return `
        <div class="update-item">
          <div class="update-icon ${ui.cls}">${ui.icon}</div>
          <div class="update-body">
            <div class="ub-name">${u.employees?.name || 'Unknown'}</div>
            <div class="ub-msg">${u.message || ''}</div>
            ${u.photo_url ? `<img src="${u.photo_url}" style="margin-top:6px;max-width:100%;border-radius:6px;cursor:pointer" onclick="window.open('${u.photo_url}','_blank')">` : ''}
            <div class="ub-time">${time}</div>
          </div>
        </div>
      `;
    }).join('');
  } else {
    updEl.innerHTML = '<div class="empty" style="padding:16px 0">No activity today yet</div>';
  }

  // Highlight selected card
  document.querySelectorAll('.job-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`[onclick*="${jobId}"]`)?.classList.add('selected');
}

function closeDetail() {
  selectedJobId = null;
  document.getElementById('supplies-view').style.display = 'block';
  document.getElementById('detail-view').classList.remove('visible');
  document.querySelectorAll('.job-card').forEach(c => c.classList.remove('selected'));
}

function subscribeRealtime() {
  supabaseClient
    .channel('dashboard')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'job_updates' }, () => {
      loadDashboard();
      if (selectedJobId) openDetail(selectedJobId, document.getElementById('detail-title').textContent);
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'supply_requests' }, () => {
      loadSupplies();
      loadDashboard();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'job_assignments' }, () => {
      loadDashboard();
      if (selectedJobId) openDetail(selectedJobId, document.getElementById('detail-title').textContent);
    })
    .subscribe();
}

function openAddJob() {
  document.getElementById('add-job-modal').classList.add('visible');
}
function closeAddJob() {
  document.getElementById('add-job-modal').classList.remove('visible');
}
async function saveJob() {
  const name = document.getElementById('new-job-name').value.trim();
  const address = document.getElementById('new-job-address').value.trim();
  const manager_email = document.getElementById('new-job-email').value.trim();
  if (!name) return alert('Job name is required');

  await fetch('/api/jobs', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, address, manager_email })
  });
  closeAddJob();
  await loadDashboard();
}

// Store data globally for overlays
let allJobsData = [];
let allAssignmentsData = [];
let allSuppliesData = [];
let allUpdatesData = [];

async function showOverlay(type) {
  const overlay = document.getElementById('stat-overlay');
  const title = document.getElementById('overlay-title');
  const body = document.getElementById('overlay-body');

  document.querySelectorAll('.stat').forEach(s => s.classList.remove('active'));
  document.getElementById(`scard-${type}`)?.classList.add('active');

  overlay.classList.add('visible');

  if (type === 'jobs') {
    title.textContent = '📋 Active Jobs';
    body.innerHTML = allJobsData.filter(j => j.status === 'active').map(j => `
      <div class="overlay-row" style="cursor:pointer" onclick="closeOverlay();openDetail('${j.id}','${j.name.replace(/'/g,"\\'")}')">
        <div class="overlay-avatar">🏗️</div>
        <div class="overlay-info">
          <div class="oi-name">${j.name}</div>
          <div class="oi-sub">📍 ${j.address || 'No address'}</div>
        </div>
        <span class="chip chip-green" style="margin-left:auto">● active</span>
      </div>
    `).join('') || '<div style="color:#64748b;text-align:center;padding:20px">No active jobs</div>';

  } else if (type === 'crew') {
    title.textContent = '👷 Crew On Site';
    const onSite = allAssignmentsData.filter(a => a.checked_in_at && !a.checked_out_at);
    body.innerHTML = onSite.map(a => `
      <div class="overlay-row">
        <div class="overlay-avatar">${(a.employees?.name||'?')[0].toUpperCase()}</div>
        <div class="overlay-info">
          <div class="oi-name">${a.employees?.name || 'Unknown'}</div>
          <div class="oi-sub">📍 ${a.jobs?.name || '—'} • Checked in ${new Date(a.checked_in_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div>
        </div>
        <span class="chip chip-green" style="margin-left:auto">● on site</span>
      </div>
    `).join('') || '<div style="color:#64748b;text-align:center;padding:20px">No crew currently checked in</div>';

  } else if (type === 'supplies') {
    title.textContent = '📦 Pending Supply Requests';
    const pending = allSuppliesData.filter(s => s.status === 'pending');
    body.innerHTML = pending.map(s => `
      <div class="overlay-row">
        <div class="overlay-avatar">📦</div>
        <div class="overlay-info">
          <div class="oi-name">${s.items}</div>
          <div class="oi-sub">${s.jobs?.name} • 👷 ${s.employees?.name} • <span style="color:${s.urgency==='same_day'?'#f87171':'#fbbf24'}">${s.urgency.replace('_',' ').toUpperCase()}</span></div>
        </div>
        <div style="display:flex;gap:6px;margin-left:auto">
          <button class="status-btn btn-prepare" onclick="updateSupply('${s.id}','preparing');closeOverlay()">Preparing</button>
          <button class="status-btn btn-delivered" onclick="updateSupply('${s.id}','delivered');closeOverlay()">✓ Done</button>
        </div>
      </div>
    `).join('') || '<div style="color:#64748b;text-align:center;padding:20px">✅ No pending supply requests</div>';

  } else if (type === 'bottlenecks') {
    title.textContent = '⚠️ Bottlenecks Today';
    const today = new Date(); today.setHours(0,0,0,0);
    const bottlenecks = allUpdatesData.filter(u => u.type === 'bottleneck' && new Date(u.created_at) >= today);
    body.innerHTML = bottlenecks.map(b => `
      <div class="overlay-row" style="cursor:pointer" onclick="closeOverlay();openDetail('${b.job_id}','${(b.jobs?.name||'').replace(/'/g,"\\'")}')">
        <div class="overlay-avatar">⚠️</div>
        <div class="overlay-info">
          <div class="oi-name">${b.message}</div>
          <div class="oi-sub">${b.jobs?.name} • 👷 ${b.employees?.name} • ${new Date(b.created_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div>
        </div>
      </div>
    `).join('') || '<div style="color:#64748b;text-align:center;padding:20px">✅ No bottlenecks today</div>';
  }
}

function closeOverlay(e) {
  if (e && e.target !== document.getElementById('stat-overlay')) return;
  document.getElementById('stat-overlay').classList.remove('visible');
  document.querySelectorAll('.stat').forEach(s => s.classList.remove('active'));
}

init();
</script>
</body>
</html>
