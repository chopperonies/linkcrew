<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - LinkCrew</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #1a1a1a;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }
    input[type="email"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input[type="email"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }
    .button:hover {
      background: #5568d3;
    }
    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .links {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
    .links a {
      color: #667eea;
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .message {
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.5;
    }
    .error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }
    .success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">LinkCrew</div>
    <h1>Reset Password</h1>
    <p class="subtitle">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

    <div id="message"></div>

    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>

      <button type="submit" class="button" id="submitBtn">Send Recovery Link</button>
    </form>

    <div class="links">
      <a href="/auth/login.html">← Back to sign in</a>
    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const messageEl = document.getElementById('message');
      const submitBtn = document.getElementById('submitBtn');
      const form = document.getElementById('forgotForm');

      if (!email) {
        messageEl.innerHTML = '<div class="message error">Email is required</div>';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        const result = await res.json();

        // Always show success message for security (don't reveal if email exists)
        messageEl.innerHTML = `<div class="message success">${result.message || 'If an account exists with this email, a recovery link has been sent'}</div>`;
        form.style.display = 'none';

        // Option to try another email
        const anotherBtn = document.createElement('button');
        anotherBtn.textContent = 'Try another email';
        anotherBtn.className = 'button';
        anotherBtn.style.marginTop = '10px';
        anotherBtn.onclick = () => {
          form.style.display = 'block';
          messageEl.innerHTML = '';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send Recovery Link';
        };
        messageEl.parentElement.insertBefore(anotherBtn, messageEl.nextSibling);

      } catch (err) {
        console.error('Password reset error:', err);
        messageEl.innerHTML = `<div class="message error">Error: ${err.message || 'Request failed'}</div>`;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Recovery Link';
      }
    });
  </script>
</body>
</html>
