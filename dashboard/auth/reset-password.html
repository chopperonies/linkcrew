<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - LinkCrew</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #1a1a1a;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }
    .button:hover {
      background: #5568d3;
    }
    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .links {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
    .links a {
      color: #667eea;
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .message {
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }
    .success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">LinkCrew</div>
    <h1>Create New Password</h1>
    <p class="subtitle">Enter a new password for your account</p>

    <div id="message"></div>

    <form id="resetForm" style="display: none;">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" required placeholder="At least 8 characters">
        <div class="hint">Minimum 8 characters for security</div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repeat your password">
      </div>

      <button type="submit" class="button" id="submitBtn">Reset Password</button>
    </form>

    <div id="loading" style="text-align: center; color: #666;">
      <p>Verifying recovery link...</p>
    </div>

    <div class="links">
      <a href="/auth/login.html">Back to sign in</a>
    </div>
  </div>

  <script>
    // Fetch Supabase config
    async function initReset() {
      try {
        const configRes = await fetch('/api/config');
        const config = await configRes.json();

        // Load Supabase JS
        if (!window.supabase) {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
          document.head.appendChild(script);
          await new Promise(r => script.onload = r);
        }

        const { createClient } = window.supabase;
        const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

        // Get current session - Supabase automatically reads recovery token from URL hash
        const { data: { session }, error } = await supabase.auth.getSession();

        const messageEl = document.getElementById('message');
        const loadingEl = document.getElementById('loading');
        const resetForm = document.getElementById('resetForm');

        if (error || !session) {
          loadingEl.style.display = 'none';
          messageEl.innerHTML = '<div class="message error">Recovery link is invalid or expired. <a href="/auth/forgot-password.html">Request a new one</a>.</div>';
          return;
        }

        // Valid session from recovery link - show form
        loadingEl.style.display = 'none';
        resetForm.style.display = 'block';

        // Handle form submission
        resetForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          const password = document.getElementById('password').value;
          const confirmPassword = document.getElementById('confirmPassword').value;
          const submitBtn = document.getElementById('submitBtn');

          if (password.length < 8) {
            messageEl.innerHTML = '<div class="message error">Password must be at least 8 characters</div>';
            return;
          }

          if (password !== confirmPassword) {
            messageEl.innerHTML = '<div class="message error">Passwords do not match</div>';
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = 'Resetting...';

          try {
            const { error: updateError } = await supabase.auth.updateUser({
              password: password,
            });

            if (updateError) {
              messageEl.innerHTML = `<div class="message error">${updateError.message}</div>`;
              submitBtn.disabled = false;
              submitBtn.textContent = 'Reset Password';
              return;
            }

            messageEl.innerHTML = '<div class="message success">Password reset successful! Redirecting to sign in...</div>';
            setTimeout(() => {
              window.location.href = '/auth/login.html';
            }, 2000);

          } catch (err) {
            console.error('Password reset error:', err);
            messageEl.innerHTML = `<div class="message error">Error: ${err.message || 'Password reset failed'}</div>`;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Reset Password';
          }
        });

      } catch (err) {
        console.error('Init error:', err);
        document.getElementById('loading').innerHTML = `<div class="message error">Error: ${err.message}</div>`;
      }
    }

    // Initialize on page load
    initReset();
  </script>

  <!-- Supabase JS library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
