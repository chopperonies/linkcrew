<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - LinkCrew</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #1a1a1a;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }
    .button:hover {
      background: #5568d3;
    }
    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .links {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
    .links a {
      color: #667eea;
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .message {
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }
    .success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">LinkCrew</div>
    <h1>Create Account</h1>
    <p class="subtitle">Start managing your field crews today</p>

    <div id="message"></div>

    <form id="signupForm">
      <div class="form-group">
        <label for="company">Company Name</label>
        <input type="text" id="company" name="company" required placeholder="Your company name">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="At least 8 characters">
        <div class="hint">Minimum 8 characters for security</div>
      </div>

      <button type="submit" class="button" id="submitBtn">Create Account</button>
    </form>

    <div class="links">
      Already have an account? <a href="/auth/login.html">Sign in</a>
    </div>
  </div>

  <script>
    // Check if already logged in
    function checkAuth() {
      const token = localStorage.getItem('fs_token');
      if (token) {
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.exp * 1000 > Date.now()) {
          window.location.href = '/index.html';
        }
      }
    }

    checkAuth();

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const company = document.getElementById('company').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const messageEl = document.getElementById('message');
      const submitBtn = document.getElementById('submitBtn');

      if (!company || !email || !password) {
        messageEl.innerHTML = '<div class="message error">All fields are required</div>';
        return;
      }

      if (password.length < 8) {
        messageEl.innerHTML = '<div class="message error">Password must be at least 8 characters</div>';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        // Call signup endpoint
        const signupRes = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, company_name: company }),
        });

        const result = await signupRes.json();

        if (!signupRes.ok) {
          messageEl.innerHTML = `<div class="message error">${result.error || 'Signup failed'}</div>`;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
          return;
        }

        // Auto-login after signup
        const configRes = await fetch('/api/config');
        const config = await configRes.json();

        const { createClient } = window.supabase || await (async () => {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
          document.head.appendChild(script);
          await new Promise(r => script.onload = r);
          return window.supabase;
        })();

        const supabase = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          messageEl.innerHTML = `<div class="message error">${error.message}</div>`;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
          return;
        }

        if (data?.session?.access_token) {
          localStorage.setItem('fs_token', data.session.access_token);
          if (data.session.refresh_token) {
            localStorage.setItem('fs_refresh_token', data.session.refresh_token);
          }
          messageEl.innerHTML = '<div class="message success">Account created! Redirecting...</div>';
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 500);
        } else {
          messageEl.innerHTML = '<div class="message error">Account created but auto-login failed. Please sign in.</div>';
          setTimeout(() => {
            window.location.href = '/auth/login.html';
          }, 2000);
        }
      } catch (err) {
        console.error('Signup error:', err);
        messageEl.innerHTML = `<div class="message error">Error: ${err.message || 'Signup failed'}</div>`;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>

  <!-- Supabase JS library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
